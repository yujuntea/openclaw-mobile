<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>小强 AI</title>
  <style>
    :root { --bg: #000; --bg2: #1c1c1e; --bg3: #2c2c2e; --bg4: #3a3a3c; --text: #fff; --text2: #8e8e93; --accent: #0a84ff; --green: #30d158; --orange: #ff9f0a; --red: #ff453a; --purple: #bf5af2; --safe-top: 47px; --input-height: 60px; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html,body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, SF Pro Text, sans-serif; background: var(--bg); color: var(--text); }
    
    .header { height: var(--safe-top); background: rgba(28,28,30,.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: .5px solid rgba(255,255,255,.1); position: relative; }
    .header-left { font-size: 11px; color: var(--text2); max-width: 35%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .header-center { font-size: 15px; font-weight: 600; text-align: center; flex: 1; margin: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .header-btn { width: 32px; height: 32px; border-radius: 50%; background: transparent; border: none; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .header-btn:active { transform: scale(0.9); background: var(--bg3); }
    .header-btn.loading { animation: spin 1s linear infinite; }
    .header-btn.active { background: var(--accent); color: #fff; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .header span { font-size: 17px; font-weight: 600; }
    
    /* 导航面板 */
    .nav-panel { position: fixed; top: var(--safe-top); left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; }
    .nav-panel.active { display: block; }
    .nav-content { position: absolute; top: 0; right: 0; width: 280px; max-width: 80%; height: 100%; background: var(--bg2); padding: 20px; overflow-y: auto; animation: slideIn 0.3s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .nav-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .nav-section { margin-bottom: 24px; }
    .nav-section-title { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text); text-decoration: none; transition: all 0.2s; margin-bottom: 4px; }
    .nav-link:hover, .nav-link:active { background: var(--bg3); }
    .nav-link .icon { font-size: 20px; }
    .nav-link .text { font-size: 15px; }
    .nav-link .desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
    
    /* 语言切换按钮 */
    .lang-btn { 
      width: 36px; 
      height: 36px; 
      border-radius: 50%; 
      background: var(--bg3); 
      border: none; 
      color: var(--accent); 
      font-size: 12px; 
      font-weight: 700; 
      cursor: pointer; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      transition: all 0.2s;
    }
    .lang-btn:active { transform: scale(0.9); background: var(--bg4); }
    
    .chat { position: absolute; top: var(--safe-top); bottom: var(--input-height); left: 0; right: 0; overflow-y: auto; overflow-x: hidden; padding: 12px; padding-bottom: 20px; -webkit-overflow-scrolling: touch; } 
    
    .msg { display: flex; gap: 8px; margin-bottom: 12px; max-width: 90%; animation: in .25s ease-out; flex-shrink: 0; }
    @keyframes in { from { opacity: 0; transform: translateY(8px); } }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }
    .msg.ai { flex-direction: row; }
    
    .av { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; background: linear-gradient(135deg, #5856d6, #af52de); }
    .msg.user .av { background: var(--accent); }
    
    .msg-content { flex: 1; min-width: 0; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-word; white-space: pre-wrap; position: relative; }
    .msg.ai .bubble { background: var(--bg3); border-top-left-radius: 6px; }
    .msg.user .bubble { background: var(--accent); border-top-right-radius: 6px; }
    .tts-btn { background: var(--bg4); border: none; border-radius: 12px; padding: 6px 12px; color: var(--accent); cursor: pointer; font-size: 13px; margin-top: 8px; display: inline-flex; align-items: center; gap: 4px; }
    .tts-btn:active { transform: scale(0.95); background: var(--bg3); }
    .tts-btn.speaking { background: var(--red); color: #fff; }
    
    .time { font-size: 10px; color: var(--text2); margin-top: 4px; opacity: .7; }
    .msg.user .time { text-align: right; }
    
    /* 思考过程 - 增强显示效果 */
    .thinking { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--purple); box-shadow: 0 2px 8px rgba(191,90,242,0.2); }
    .thinking-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .thinking-icon { font-size: 16px; animation: pulse 1.5s infinite; }
    .thinking-title { font-size: 13px; color: var(--purple); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .thinking-dots { display: flex; gap: 4px; margin-left: auto; }
    .thinking-dots span { width: 6px; height: 6px; background: var(--purple); border-radius: 50%; animation: td 1.4s infinite; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes td { 0%,60%,100%{opacity:.3;transform:scale(0.8)} 30%{opacity:1;transform:scale(1)} }
    .thinking-content { font-size: 13px; color: #a0a0b0; line-height: 1.6; font-family: 'SF Mono', Monaco, monospace; max-height: 200px; overflow-y: auto; }
    
    /* 思考过程 - 紧凑模式（流式输出时） */
    .thinking.streaming { padding: 10px; animation: thinkingPulse 2s infinite; }
    @keyframes thinkingPulse { 0%,100%{box-shadow: 0 2px 8px rgba(191,90,242,0.1)} 50%{box-shadow: 0 2px 12px rgba(191,90,242,0.3)} }
    
    /* 工具执行 - 增强显示效果 */
    .tool-call { background: linear-gradient(135deg, #1a1a1a, #252525); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid var(--orange); box-shadow: 0 2px 8px rgba(255,159,10,0.15); }
    .tool-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .tool-icon { font-size: 16px; }
    .tool-name { font-size: 13px; color: var(--orange); font-weight: 600; }
    .tool-status { margin-left: auto; font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
    .tool-status.running { background: var(--orange); color: #000; animation: toolPulse 1s infinite; }
    .tool-status.done { background: var(--green); color: #000; }
    .tool-status.error { background: var(--red); color: #fff; }
    @keyframes toolPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    .tool-content { font-size: 12px; color: #909090; font-family: 'SF Mono', Monaco, 'Courier New', monospace; white-space: pre-wrap; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-top: 8px; }
    
    /* 工作状态指示器 */
    .work-indicator { position: fixed; top: calc(var(--safe-top) + 8px); right: 12px; background: var(--purple); color: #fff; padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; display: none; align-items: center; gap: 6px; z-index: 1000; box-shadow: 0 2px 10px rgba(191,90,242,0.4); animation: workIndicator 1.5s infinite; }
    .work-indicator.active { display: flex; }
    @keyframes workIndicator { 0%,100%{transform: scale(1)} 50%{transform: scale(1.05)} }
    .work-indicator::before { content: '⚡'; }
    
    /* TTS 播放指示器 */
    .tts-indicator { position: fixed; top: calc(var(--safe-top) + 8px); left: 12px; background: var(--green); color: #fff; padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; display: none; align-items: center; gap: 6px; z-index: 1000; box-shadow: 0 2px 10px rgba(48,209,88,0.4); animation: ttsPulse 1.5s infinite; }
    .tts-indicator.active { display: flex; }
    @keyframes ttsPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
    .tts-indicator::before { content: '🔊'; }
    
    /* TTS 按钮激活状态 */
    .header-btn.active { background: var(--green); color: #fff; }
    
    /* 流式输出 */
    .streaming { border-left-color: var(--accent); }
    .streaming .thinking-icon { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    
    .input-wrap { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28,28,30,.95); padding: 6px 8px; padding-bottom: calc(6px + env(safe-area-inset-bottom,0)); border-top: .5px solid rgba(255,255,255,.1); z-index: 100; }
    .input-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .input-row:last-child { margin-bottom: 0; }
    /* 第一行按钮布局：快捷按钮固定宽度，模型选择器占满剩余空间，图片/文件按钮固定宽度 */
    .input-row:first-child .qa-btn { flex-shrink: 0; }
    .input-row:first-child .model-selector { flex: 1; min-width: 0; }
    .input-row:first-child .img-btn { flex-shrink: 0; }
  
  /* 快捷工具面板（可展开/收起） */
  .quick-panel {
    position: absolute;
    bottom: 52px;
    left: 12px;
    right: 12px;
    background: rgba(44,44,46,0.98);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 6px;
    z-index: 150;
    animation: slideUp 0.2s ease;
  }
  
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .quick-panel-content {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  
  .quick-panel-content a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 8px 6px;
    background: rgba(58,58,60,0.6);
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 11px;
    transition: all 0.15s ease;
  }
  
  .quick-panel-content a:hover {
    background: rgba(58,58,60,0.9);
  }
  
  .quick-panel-content a:active {
    background: var(--accent);
    transform: scale(0.95);
  }
  
  .quick-panel-content a .icon {
    font-size: 18px;
  }
  
  .quick-panel-content a .label {
    font-size: 10px;
    color: var(--text2);
  }
    .input { flex: 1; background: var(--bg3); border-radius: 18px; padding: 10px 16px; font-size: 16px; color: var(--text); border: none; outline: none; -webkit-appearance: none; }
    .send { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); border: none; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send:active { transform: scale(.92); }
    .send:disabled { background: var(--bg3); }
    
    /* 图片按钮 */
    .img-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .img-btn:active { transform: scale(.92); }
    #imgInput { display: none; }
    
    /* 图片预览 - 支持多图（单独一行，固定在输入区域上方） */
    .img-preview { display: none; position: fixed; bottom: 90px; left: 0; right: 0; width: 100%; padding: 8px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; background: rgba(28,28,30,.95); border-top: .5px solid rgba(255,255,255,.1); z-index: 99; }
    .img-preview.has-img { display: flex; align-items: center; gap: 8px; }
    .img-preview .img-list { display: flex; gap: 8px; flex-shrink: 0; }
    .img-preview .img-item { position: relative; flex-shrink: 0; }
    .img-preview img { max-width: 80px; max-height: 80px; border-radius: 8px; object-fit: cover; border: 2px solid var(--bg4); }
    .img-preview .img-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--red); border: none; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .img-preview .img-count { font-size: 12px; color: var(--text2); margin-left: 8px; flex-shrink: 0; }
    
    /* 文件预览（单独一行，固定在输入区域上方） */
    .file-preview { display: none; position: fixed; bottom: 90px; left: 0; right: 0; width: 100%; padding: 8px 12px; background: rgba(28,28,30,.95); border-top: .5px solid rgba(255,255,255,.1); z-index: 99; }
    .file-preview.has-file { display: flex; align-items: center; gap: 8px; }
    .file-preview .file-list { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .file-preview .file-item { position: relative; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg3); border-radius: 8px; border: 1px solid var(--bg4); }
    .file-preview .file-icon { font-size: 20px; }
    .file-preview .file-info { display: flex; flex-direction: column; }
    .file-preview .file-name { font-size: 13px; color: var(--text); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-preview .file-size { font-size: 11px; color: var(--text2); }
    .file-preview .file-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; background: var(--red); border: none; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .file-preview .file-count { font-size: 12px; color: var(--text2); margin-left: 8px; flex-shrink: 0; }
    
    .login { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; z-index: 200; }
    .login-emoji { font-size: 64px; margin-bottom: 16px; }
    .login-title { font-size: 28px; font-weight: 700; }
    .login-sub { color: var(--text2); font-size: 15px; margin-bottom: 32px; }
    .login-input { width: 100%; max-width: 280px; background: var(--bg3); border: none; border-radius: 12px; padding: 14px 16px; color: var(--text); font-size: 15px; margin-bottom: 12px; outline: none; -webkit-appearance: none; }
    .login-btn { width: 100%; max-width: 280px; background: var(--accent); border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
    .login-err { color: var(--red); font-size: 13px; margin-top: 12px; display: none; text-align: center; }
    .hidden { display: none !important; }
    
    /* 回复中的思考/工具 */
    .reply-tools { margin-top: 8px; }
  /* 登录模态框 */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: var(--bg1);
    border-radius: 16px;
    padding: 24px;
    width: 90%;
    max-width: 360px;
  }
  .login-header { text-align: center; margin-bottom: 24px; }
  .login-icon { font-size: 48px; display: block; margin-bottom: 12px; }
  .login-form .input-group { margin-bottom: 16px; }
  .login-form label { display: block; font-size: 14px; color: var(--text2); margin-bottom: 8px; }
  .login-form input[type="password"] {
    width: 100%; padding: 12px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px; box-sizing: border-box;
  }
  .checkbox-label {
    display: flex; align-items: center; gap: 8px; font-size: 14px;
    color: var(--text2); cursor: pointer; margin: 12px 0;
  }
  .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; }
  .login-btn {
    width: 100%; padding: 14px; background: var(--accent); border: none;
    border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 16px;
  }
  .login-btn:active { opacity: 0.8; }
  .login-hint { text-align: center; font-size: 12px; color: var(--text3); margin-top: 16px; }
  
  /* 快捷操作栏 */
  /* 快捷操作栏 */
  .quick-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: rgba(28,28,30,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    flex-shrink: 0;
    scrollbar-width: none;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .quick-actions::-webkit-scrollbar { display: none; }
  
  .qa-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 4px 6px;
    background: rgba(58,58,60,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: var(--text);
    font-size: 9px;
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
    min-width: 48px;
    height: 32px;
  }
  
  .qa-btn:hover {
    background: rgba(58,58,60,0.9);
    border-color: rgba(255,255,255,0.2);
  }
  
  .qa-btn:active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: scale(0.95);
  }
  
  .qa-icon {
    font-size: 16px;
    line-height: 1;
  }
  
  .qa-text {
    font-size: 8px;
    color: var(--text2);
    font-weight: 500;
  }
  
  .qa-btn:active .qa-text {
    color: #fff;
  }
  
  .qa-divider {
    width: 1px;
    height: 24px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
    margin: 0 4px;
  }
  
  /* 模型选择器 - 自定义下拉菜单 */
  .model-selector {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  
  .model-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(58,58,60,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    height: 32px;
    transition: all 0.15s;
  }
  
  .model-btn:hover {
    border-color: rgba(255,255,255,0.2);
    background: rgba(58,58,60,0.8);
  }
  
  .model-btn.active {
    border-color: var(--accent);
  }
  
  .model-btn .btn-content {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  
  .model-btn .model-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .model-btn .arrow {
    font-size: 9px;
    opacity: 0.7;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  
  .model-btn.active .arrow {
    transform: rotate(180deg);
  }
  
  .model-menu {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: rgba(30,30,30,0.98);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 6px 0;
    min-width: 180px;
    max-height: 300px;
    overflow-y: auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    z-index: 1001;
    display: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  
  .model-menu.show {
    display: block;
  }
  
  .model-menu-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
    font-size: 12px;
    line-height: 1.4;
  }
  
  .model-menu-item:hover {
    background: rgba(255,255,255,0.08);
  }
  
  .model-menu-item:active {
    background: var(--accent);
  }
  
  .model-menu-item.selected {

  <script>
    // ========== 全局变量 ==========
    // 强制使用 /api 代理和正确的session key（与Dashboard共享）
    let gateway = '/api';
    let authToken = ''; // 将在页面加载时从 config.js 初始化
    let sessionKey = 'agent:main:main';
    let selectedImages = []; // 存储选中的图片 [{file, base64, id}]
    let selectedFiles = []; // 存储选中的文件 [{file, serverPath, id, name, size, type}]
    let gwClient = null; // WebSocket 客户端
    
    // TTS 相关变量
    let ttsEnabled = false;  // 是否启用自动朗读
    let autoPlayEnabled = false;  // 是否启用自动播放
    let currentUtterance = null;  // 当前正在播放的语音
    let lastAIMessage = '';  // 最后一条 AI 消息
    
    // ========== Session 认证管理 ==========
    
    // 检查 Session 是否有效
    async function checkSessionAuth() {
      const sessionToken = localStorage.getItem('session_token');
      if (!sessionToken) {
        return false;
      }
      
      try {
        const resp = await fetch('/api/health', {
          headers: {'Authorization': 'Bearer ' + sessionToken}
        });
        return resp.status !== 401;
      } catch (e) {
        console.error('Session 验证失败:', e);
        return false;
      }
    }
    
    // 显示 Session 登录模态框
    function showSessionLoginModal() {
      document.getElementById('sessionLoginModal').classList.add('show');
      // 自动填充保存的 token
      const savedToken = localStorage.getItem('saved_gateway_token');
      if (savedToken) {
        document.getElementById('sessionLoginToken').value = savedToken;
        document.getElementById('rememberToken').checked = true;
      }
    }
    
    // 隐藏 Session 登录模态框
    function hideSessionLoginModal() {
      document.getElementById('sessionLoginModal').classList.remove('show');
    }
    
    // Session 登录
    async function doSessionLogin() {
      const token = document.getElementById('sessionLoginToken').value.trim();
      const remember = document.getElementById('rememberToken').checked;
      
      if (!token) {
        alert('请输入 Token');
        return;
      }
      
      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({token})
        });
        
        const data = await resp.json();
        
        if (data.success) {
          // 保存 session token
          localStorage.setItem('session_token', data.token);
          
          // 保存 gateway token（如果勾选记住）
          if (remember) {
            localStorage.setItem('saved_gateway_token', token);
          } else {
            localStorage.removeItem('saved_gateway_token');
          }
          
          // 隐藏登录框
          hideSessionLoginModal();
          
          return true;
        } else {
          alert('登录失败: ' + (data.message || data.error || '未知错误'));
          return false;
        }
      } catch (e) {
        alert('登录失败: ' + e.message);
        return false;
      }
    }
    
    // 获取认证头
    function getAuthHeaders() {
      const sessionToken = localStorage.getItem('session_token');
      const headers = {};
      if (sessionToken) {
        headers['Authorization'] = 'Bearer ' + sessionToken;
      }
      return headers;
    }
    
    // ========== 快捷操作 ==========
    
    // 切换快捷面板
    function toggleQuickPanel() {
      const panel = document.getElementById('quickPanel');
      if (panel.style.display === 'none') {
        panel.style.display = 'block';
      } else {
        panel.style.display = 'none';
      }
    }
    
    // 点击其他地方关闭面板
    document.addEventListener('click', function(e) {
      // 关闭快捷面板
      const panel = e.target.closest('.quick-panel');
      const btn = e.target.closest('.qa-btn');
      if (!panel && !btn) {
        const quickPanel = document.getElementById('quickPanel');
        if (quickPanel) quickPanel.style.display = 'none';
      }
      
      // 关闭模型菜单
      const modelMenu = e.target.closest('.model-menu');
      const modelBtn = e.target.closest('.model-btn');
      if (!modelMenu && !modelBtn) {
        closeModelMenu();
      }
    });
    
    // 发送命令（直接发送消息）
    // 发送命令
    async function sendCommand(command) {
      // 检查是否已连接
      if (!gwClient || !gwClient.authenticated) {
        alert('请等待连接建立...');
        return;
      }
      
      // 命令名称映射
      const cmdNames = {
        '/status': '📊 状态',
        '/compact': '🧹 压缩',
        '/context detail': '📋 上下文',
        '/stop': '⏹️ 停止',
        '/new': '🆕 新会话'
      };
      
      // 显示用户消息
      addMsg({content: cmdNames[command] || command, role: 'user'});
      
      // 显示"发送中"指示器
      showWorkIndicator(true, '🤔 处理中...');
      
      // 创建 AI 消息容器
      const aiMsg = createAIMessage();
      const bubble = aiMsg.querySelector('.bubble');
      bubble.innerHTML = '<span class="thinking-icon">🤔</span> 等待回复...';
      
      try {
        // 发送命令
        const result = await gwClient.sendMessage(command, []);
        console.log('命令发送成功:', result);
      } catch (e) {
        // 隐藏指示器
        showWorkIndicator(false);
        // 显示错误
        bubble.innerHTML = '❌ 发送失败：' + e.message;
        console.error('发送命令失败:', e);
      }
    }
    
    // 切换模型
    async function switchModel(model) {
      if (!model) return;
      
      // 检查是否已连接
      if (!gwClient || !gwClient.authenticated) {
        alert('请等待连接建立...');
        return;
      }
      
      // 显示用户消息
      addMsg({content: `🔄 切换模型：${model}`, role: 'user'});
      
      // 显示"发送中"指示器
      showWorkIndicator(true, '🤔 处理中...');
      
      // 创建 AI 消息容器
      const aiMsg = createAIMessage();
      const bubble = aiMsg.querySelector('.bubble');
      bubble.innerHTML = '<span class="thinking-icon">🤔</span> 等待回复...';
      
      try {
        // 发送切换模型消息
        const result = await gwClient.sendMessage(`/model ${model}`, []);
        console.log('切换模型成功:', result);
        
        // 保存当前模型到 localStorage
        localStorage.setItem('current_model', model);
        
        // 重新加载模型列表以更新对号标记
        await loadModels();
        
        // 隐藏指示器
        showWorkIndicator(false);
        bubble.innerHTML = '✅ 已切换到模型：' + model;
        
      } catch (e) {
        // 隐藏指示器
        showWorkIndicator(false);
        // 显示错误
        bubble.innerHTML = '❌ 切换失败：' + e.message;
        console.error('切换模型失败:', e);
      }
    }
    
    // ========== WebSocket 客户端实现 ==========
    class GatewayClient {
      constructor(url, token, sessionKey, onEvent, onConnect, onDisconnect) {
        this.url = url;
        this.token = token;
        this.sessionKey = sessionKey;
        this.onEvent = onEvent;
        this.onConnect = onConnect;
        this.onDisconnect = onDisconnect;
        this.ws = null;
        this.pending = new Map();
        this.connected = false;
        this.reconnectTimer = null;
      }
      
      connect() {
        // 直接使用传入的完整 WebSocket URL
        console.log('Connecting to WebSocket:', this.url);
        this.ws = new WebSocket(this.url);
        
        this.ws.onopen = () => {
          console.log('WebSocket connected');
          this.connected = true;
          this.sendConnect();
        };
        
        this.ws.onmessage = (event) => this.handleMessage(event.data);
        
        this.ws.onerror = (error) => {
          console.error('WebSocket error:', error);
        };
        
        this.ws.onclose = (event) => {
          console.log('WebSocket closed:', event.code, event.reason);
          this.connected = false;
          this.onDisconnect?.(event.code, event.reason);
          // 自动重连
          this.reconnectTimer = setTimeout(() => this.connect(), 3000);
        };
      }
      
      disconnect() {
        if (this.reconnectTimer) {
          clearTimeout(this.reconnectTimer);
          this.reconnectTimer = null;
        }
        if (this.ws) {
          this.ws.close();
          this.ws = null;
        }
      }
      
      sendConnect() {
        // 注意：nonce 应该在 device 对象中，但 dangerouslyDisableDeviceAuth=true 时不需要 device
        // 所以我们只发送 token，不发送 nonce
        const authObj = this.token ? { token: this.token } : {};
        
        const msg = {
          type: 'req',
          id: this.genId(),
          method: 'connect',
          params: {
            minProtocol: 3,
            maxProtocol: 3,
            client: {
              id: 'openclaw-control-ui',
              version: '1.0',
              platform: navigator.platform || 'web',
              mode: 'webchat',
              instanceId: this.genId()
            },
            caps: ['tool-events'],  // 启用工具事件接收
            scopes: ['operator.admin', 'operator.approvals', 'operator.pairing', 'operator.write', 'operator.read'],
            auth: authObj
          }
        };
        console.log('【DEBUG】发送 connect 消息，scopes:', JSON.stringify(msg.params.scopes));
        console.log('发送 connect 消息:', JSON.stringify(msg, null, 2));
        this.ws.send(JSON.stringify(msg));
      }
      
      handleMessage(data) {
        try {
          console.log('[WS] Raw message:', data.substring(0, 300));
          const msg = JSON.parse(data);
          
          // 打印所有收到的消息，便于调试
          console.log('[WS] Parsed message:', msg.type, msg.method || msg.event);
          if (msg.type === 'res' || msg.type === 'event') {
            console.log('收到消息:', msg.type, msg.method || msg.event, msg);
          }
          
          if (msg.type === 'res') {
            // 检查是否是 hello-ok 响应
            if (msg.ok && msg.payload?.type === 'hello-ok') {
              console.log('Gateway hello-ok received:', msg.payload);
              this.authenticated = true;
              this.onConnect?.(msg.payload);
            }
            
            const pending = this.pending.get(msg.id);
            if (pending) {
              this.pending.delete(msg.id);
              if (msg.ok) {
                pending.resolve(msg.payload);
              } else {
                console.error('请求失败:', msg.error);
                pending.reject(new Error(msg.error?.message || 'Request failed'));
              }
            }
          } else if (msg.type === 'event') {
            // 处理 connect.challenge 事件 - 需要用 nonce 认证
            if (msg.event === 'connect.challenge') {
              const nonce = msg.payload?.nonce;
              if (nonce) {
                console.log('收到 connect.challenge, nonce:', nonce);
                this.connectNonce = nonce;
                this.sendConnect(); // 发送认证
              }
            }
            // 处理 hello 事件（连接成功）
            else if (msg.event === 'hello') {
              console.log('Gateway hello:', msg.payload);
              this.authenticated = true;
              this.onConnect?.(msg.payload);
            }
            // 其他事件
            else if (this.onEvent) {
              this.onEvent(msg.event, msg.payload);
            }
          }
        } catch(e) {
          console.error('Parse message error:', e, data);
        }
      }
      
      request(method, params) {
        return new Promise((resolve, reject) => {
          if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
            reject(new Error('WebSocket not connected'));
            return;
          }
          
          const id = this.genId();
          const fullParams = { sessionKey: this.sessionKey, ...params };
          const msg = {
            type: 'req',
            id,
            method,
            params: fullParams
          };
          
          console.log('发送请求:', method, fullParams);
          
          this.pending.set(id, { resolve, reject, method });
          this.ws.send(JSON.stringify(msg));
          
          // 超时处理
          setTimeout(() => {
            if (this.pending.has(id)) {
              this.pending.delete(id);
              reject(new Error('Request timeout: ' + method));
            }
          }, 30000);
        });
      }
      
      // 发送消息
      async sendMessage(message, attachments = []) {
        return this.request('chat.send', {
          message,
          deliver: false,
          idempotencyKey: this.genId(),
          attachments
        });
      }
      
      // 获取历史消息
      async getHistory(limit = 50) {
        console.log('获取历史消息, sessionKey:', this.sessionKey, 'limit:', limit);
        try {
          const result = await this.request('chat.history', { sessionKey: this.sessionKey, limit });
          console.log('历史消息原始结果:', JSON.stringify(result).substring(0, 500));
          
          // 尝试多种可能的返回格式
          if (result?.messages) {
            return result.messages;
          } else if (Array.isArray(result)) {
            return result;
          } else if (result?.data?.messages) {
            return result.data.messages;
          } else if (result?.history) {
            return result.history;
          }
          
          console.log('无法解析历史消息格式');
          return [];
        } catch(e) {
          console.error('获取历史消息失败:', e);
          return [];
        }
      }
      
      // 终止运行
      async abort() {
        return this.request('chat.abort', {});
      }
      
      genId() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
          const r = Math.random() * 16 | 0;
          return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
        });
      }
    }

    // 历史消息存储（使用 localStorage）

    const LOGIN_EXPIRY_MS = 60 * 60 * 1000; // 1小时有效期
    
    // 保存登录状态
    function saveLoginState(wsUrl, token, sessionKey) {
      const state = {
        wsUrl: wsUrl,
        token: token,
        sessionKey: sessionKey,
        loginTime: Date.now()
      };
      localStorage.setItem(LOGIN_KEY, JSON.stringify(state));
      console.log('Login state saved');
    }
    
    // 获取登录状态
    function getLoginState() {
      const stateStr = localStorage.getItem(LOGIN_KEY);
      if (!stateStr) return null;
      
      try {
        const state = JSON.parse(stateStr);
        const elapsed = Date.now() - state.loginTime;
        
        // 检查是否过期
        if (elapsed > LOGIN_EXPIRY_MS) {
          console.log('Login state expired, elapsed:', Math.floor(elapsed / 60000), 'minutes');
          localStorage.removeItem(LOGIN_KEY);
          return null;
        }
        
        console.log('Login state valid, remaining:', Math.floor((LOGIN_EXPIRY_MS - elapsed) / 60000), 'minutes');
        return state;
      } catch (e) {
        console.error('Failed to parse login state:', e);
        return null;
      }
    }
    
    // 清除登录状态
    function clearLoginState() {
      localStorage.removeItem(LOGIN_KEY);
    }
    
    // 保存消息到本地存储
    function saveMessageToHistory(msg) {
      try {
        const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        history.push({
          role: msg.role,
          content: msg.content,
          timestamp: msg.timestamp || Date.now()
        });
        // 保留最近的消息
        if (history.length > MAX_HISTORY) {
          history.splice(0, history.length - MAX_HISTORY);
        }
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      } catch(e) {
        console.error('保存历史消息失败:', e);
      }
    }

        for (const msg of messageHistory) {
          renderHistoryMessage(msg);
        }
        
        scrollToBottom();
        
      } catch(e) {
        console.error('加载历史消息失败:', e);

    // 渲染单条历史消息
    function renderHistoryMessage(msg) {
      const area = document.getElementById('chatArea');
      const isUser = msg.role === 'user';
      const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
      
      const div = document.createElement('div');
      div.className = 'msg ' + (isUser ? 'user' : 'ai');
      
      // 处理消息内容
      let contentHtml = '';
      if (typeof msg.content === 'string') {
        contentHtml = fmt(msg.content);
      } else if (Array.isArray(msg.content)) {
        // 处理多模态消息（图片+文字）
        for (const item of msg.content) {
          if (item.type === 'text') {
            contentHtml += fmt(item.text);
          } else if (item.type === 'image_url' || item.type === 'image') {
            const imgUrl = item.image_url?.url || item.url || item.content || '';
            if (imgUrl && typeof imgUrl === 'string') {
              contentHtml += '<img src="' + imgUrl + '" style="max-width:150px;max-height:150px;border-radius:12px;margin:4px 0;">';
            }
          }
        }
      }
      
      div.innerHTML = '<div class="av">' + (isUser ? '👤' : '🤖') + '</div><div class="bubble">' + contentHtml + '<div class="time">' + time + '</div></div>';

          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({token})
        });
        
        const data = await resp.json();
        
        if (data.success) {
          localStorage.setItem('session_token', data.token);
          console.log('✅ Session 登录成功');
        } else {
          console.warn('⚠️ Session 登录失败:', data.error);
        }
      } catch (e) {
        console.error('❌ Session 登录错误:', e);

    // 建立 WebSocket 连接

      console.log('connectWebSocket called with URL:', wsUrl);
      const chatArea = document.getElementById('chatArea');
      chatArea.innerHTML = '<div style="text-align:center;padding:20px;color:#8e8e93;">连接中...<br><small>' + wsUrl + '</small></div>';
      
      console.log('Connecting to WebSocket:', wsUrl);
      
      console.log('Creating GatewayClient...');
      gwClient = new GatewayClient(
        wsUrl,           // url
        authToken,       // token
        sessionKey,       // sessionKey
        // onEvent
        (event, payload) => {
          console.log('Event:', event, payload);
          if (event === 'chat') {
            handleChatEvent(payload);
          } else if (event === 'agent') {
            handleAgentEvent(payload);
          }
        },
        // onConnect
        (hello) => {
          console.log('Connected!', hello);
          // 清除工作状态指示器
          showWorkIndicator(false);
          // 清除连接中状态
          const chatArea = document.getElementById('chatArea');

          loadHistoryFromGateway();
        },
        // onDisconnect
        (code, reason) => {
          console.log('Disconnected:', code, reason);
          showWorkIndicator(true, '连接断开，正在重连...');

      );

    // 刷新历史消息
    async function refreshHistory() {
      const refreshBtn = document.getElementById('refreshBtn');
      const chatArea = document.getElementById('chatArea');
      
      // 检查连接状态
      if (!gwClient || !gwClient.authenticated) {
        chatArea.innerHTML = '<div style="text-align:center;padding:20px;color:#ff453a;">连接已断开<br>请刷新页面重新连接</div>';

      loadingHint.id = 'refreshHint';

      loadingHint.textContent = '🔄 正在刷新...';
      chatArea.insertBefore(loadingHint, chatArea.firstChild);
      
      try {
        // 重新加载历史消息
        await loadHistoryFromGateway();
        
        // 显示成功提示
        const successHint = document.createElement('div');
        successHint.style.cssText = 'text-align:center;padding:10px;color:var(--green);font-size:13px;animation:in .25s ease-out;';
        successHint.textContent = '✅ 刷新成功';
        chatArea.insertBefore(successHint, chatArea.firstChild);
        
        // 2秒后移除成功提示
        setTimeout(() => {
          successHint.remove();
        }, 2000);
        
      } catch (e) {
        console.error('刷新失败:', e);
        
        // 显示失败提示
        const errorHint = document.createElement('div');
        errorHint.style.cssText = 'text-align:center;padding:10px;color:var(--red);font-size:13px;';
        errorHint.textContent = '❌ 刷新失败: ' + e.message;
        chatArea.insertBefore(errorHint, chatArea.firstChild);
        
        // 3秒后移除失败提示
        setTimeout(() => {
          errorHint.remove();
        }, 3000);
        
      } finally {
        // 移除加载状态
        refreshBtn.classList.remove('loading');
        refreshBtn.disabled = false;
        
        // 移除刷新提示
        const hint = document.getElementById('refreshHint');
        if (hint) hint.remove();
      }

    // 从 Gateway 加载历史消息
    async function loadHistoryFromGateway() {
      const chatArea = document.getElementById('chatArea');
      
      if (!gwClient || !gwClient.authenticated) {
        chatArea.innerHTML = '<div style="text-align:center;padding:20px;color:#ff453a;">连接已断开<br>请刷新页面重新连接</div>';
        return;
      }

        const messages = await gwClient.getHistory(50);
        chatArea.innerHTML = '';

          chatArea.innerHTML = '<div style="text-align:center;padding:20px;color:#8e8e93;">暂无历史消息<br>开始新对话吧</div>';
          return;
        }
        
        // 渲染历史消息
        for (const msg of messages) {
          renderHistoryMessage(msg);
        }
        
        scrollToBottom();
        
      } catch(e) {
        console.error('加载历史消息失败:', e);

        try {
          const localHistory = JSON.parse(localStorage.getItem('oc_mobile_history') || '[]');

        }
      }

    // 处理 agent 事件（工具调用、思考过程等）
    function handleAgentEvent(payload) {
      if (!payload) return;
      
      const stream = payload.stream;
      const data = payload.data;
      
      console.log('[handleAgentEvent] stream:', stream, 'data:', JSON.stringify(data).substring(0, 500));
      
      if (stream === 'tool') {
        // 工具调用事件
        handleToolEvent(data, payload);
      } else if (stream === 'assistant') {
        // AI 回复事件（流式输出）- 只更新，不重复创建
        // 注意：chat 事件也会处理文本，这里只处理工具相关
        console.log('[handleAgentEvent] assistant stream - 文本由 chat 事件处理');
      } else if (stream === 'lifecycle') {
        // 生命周期事件（开始、结束等）
        handleLifecycleEvent(data, payload);
      }
    }
    
    // 处理工具调用事件
    function handleToolEvent(data, payload) {
      if (!data) return;
      
      // 调试：打印完整的工具事件数据
      console.log('[handleToolEvent] 完整 data:', JSON.stringify(data, null, 2));
      console.log('[handleToolEvent] 完整 payload:', JSON.stringify(payload, null, 2));
      
      const toolName = data.name || data.tool_name || 'unknown';
      const phase = data.phase || data.status || 'running';
      // 支持多种参数字段名：input, meta, arguments, params
      const input = data.input || data.meta || data.arguments || data.params;
      const result = data.result || data.output;
      const isError = data.isError === true;
      
      console.log('[handleToolEvent] tool:', toolName, 'phase:', phase, 'input:', input ? '有' : '无', 'result:', result ? '有' : '无', 'isError:', isError);
      
      // 更新工作指示器
      if (phase === 'start' || phase === 'running') {
        showWorkIndicator(true, '🔧 ' + toolName + '...');
      }
      
      // 获取或创建 AI 消息容器
      let aiMsg = document.querySelector('.msg.ai:last-child');
      if (!aiMsg) {
        const area = document.getElementById('chatArea');
        aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.innerHTML = '<div class="av">🤖</div><div class="bubble"><div class="reply-tools"></div></div>';
        area.appendChild(aiMsg);
      }
      
      const toolsDiv = aiMsg.querySelector('.reply-tools');
      if (!toolsDiv) return;
      
      // 查找或创建工具卡片
      let toolCard = toolsDiv.querySelector('[data-tool="' + toolName + '"]');
      
      // result 阶段表示工具执行完成，需要更新状态
      if (phase === 'result') {
        // 如果没有工具卡片，创建一个
        if (!toolCard) {
          toolCard = document.createElement('div');
          toolCard.className = 'tool-call';
          toolCard.dataset.tool = toolName;
          toolsDiv.appendChild(toolCard);
        }
        
        // 更新工具卡片内容
        let inputHtml = '';
        if (input) {
          const inputStr = typeof input === 'string' ? input : JSON.stringify(input, null, 2);
          inputHtml = '<div class="tool-content">参数:<br>' + escapeHtml(inputStr.substring(0, 500)) + '</div>';
        }
        
        const statusClass = isError ? 'error' : 'done';
        const statusText = isError ? '失败' : '完成';
        
        toolCard.innerHTML = 
          '<div class="tool-header">' +
            '<span class="tool-icon">' + (isError ? '❌' : '✅') + '</span>' +
            '<span class="tool-name">' + escapeHtml(toolName) + '</span>' +
            '<span class="tool-status ' + statusClass + '">' + statusText + '</span>' +
          '</div>' + inputHtml;
        
        showWorkIndicator(false);
        scrollToBottom();
      } else if (phase === 'start' || phase === 'running') {
        // 创建新的工具卡片
        if (!toolCard) {
          toolCard = document.createElement('div');
          toolCard.className = 'tool-call';
          toolCard.dataset.tool = toolName;
          
          let inputHtml = '';
          if (input) {
            const inputStr = typeof input === 'string' ? input : JSON.stringify(input, null, 2);
            inputHtml = '<div class="tool-content">参数:<br>' + escapeHtml(inputStr.substring(0, 500)) + '</div>';
          }
          
          toolCard.innerHTML = 
            '<div class="tool-header">' +
              '<span class="tool-icon">🔧</span>' +
              '<span class="tool-name">' + escapeHtml(toolName) + '</span>' +
              '<span class="tool-status running">运行中</span>' +
            '</div>' + inputHtml;
          
          toolsDiv.appendChild(toolCard);
          scrollToBottom();
        }
      } else if (phase === 'end' || phase === 'done' || phase === 'complete') {
        // 更新工具卡片状态
        if (toolCard) {
          const statusSpan = toolCard.querySelector('.tool-status');
          if (statusSpan) {
            statusSpan.className = 'tool-status done';
            statusSpan.textContent = '完成';
          }
          
          // 添加结果
          if (result) {
            const resultStr = typeof result === 'string' ? result : JSON.stringify(result, null, 2);
            const contentDiv = toolCard.querySelector('.tool-content');
            if (contentDiv) {
              contentDiv.innerHTML += '<br><br>结果:<br>' + escapeHtml(resultStr.substring(0, 1000));
            } else {
              toolCard.innerHTML += '<div class="tool-content">结果:<br>' + escapeHtml(resultStr.substring(0, 1000)) + '</div>';
            }
          }
        }
        showWorkIndicator(false);
      } else if (phase === 'error') {
        // 错误状态
        if (toolCard) {
          const statusSpan = toolCard.querySelector('.tool-status');
          if (statusSpan) {
            statusSpan.className = 'tool-status error';
            statusSpan.textContent = '失败';
          }
          if (error) {
            toolCard.innerHTML += '<div class="tool-content" style="color:#ff453a;">错误: ' + escapeHtml(error) + '</div>';
          }
        }
        showWorkIndicator(false);
      }
    }
    
    // 处理 AI 回复流
    function handleAssistantStream(data, payload) {
      if (!data) return;
      
      const text = data.text || data.delta || '';
      
      if (text) {
        // 获取或创建 AI 消息气泡
        let aiMsg = document.querySelector('.msg.ai:last-child');

        }
        
        const bubble = aiMsg.querySelector('.bubble');
        if (bubble) {

          bubble.dataset.rawText = newText;
          bubble.innerHTML = fmt(newText) + '<button class="tts-btn" style="display:none;" onclick="toggleTTS(this)">🔊 朗读</button>';

      } else {

    // 处理生命周期事件

      console.log('[handleLifecycleEvent] phase:', phase);
      
      if (phase === 'start') {

            setTimeout(() => {

              }

    // 处理聊天事件（实时消息）

      if (!payload) return;
      
      const state = payload.state;
      const message = payload.message;
      
      // 调试：打印完整的消息结构
      console.log('[handleChatEvent] state:', state);

      if (state === 'delta') {

            scrollToBottom();

        // 处理思考过程 - 检查多种可能的消息格式
        const thinkingContent = message?.thinking || message?.message?.thinking || 
                              (message?.content && message.content.find?.(c => c.thinking)?.thinking);
        if (thinkingContent) {
          showWorkIndicator(true, '💭 思考中...');

            area.appendChild(aiMsg);

          const thinkingDiv = aiMsg.querySelector('.reply-thinking');
          if (thinkingDiv) {
            // 完整显示思考内容，带标题和样式

            scrollToBottom();
          }
        }
        
        // 处理工具调用 - 检查多种可能的消息格式
        const toolCalls = message?.tool_calls || message?.message?.tool_calls ||
                         (message?.content && message.content.find?.(c => c.tool_calls)?.tool_calls);
        if (toolCalls) {
          for (const tc of toolCalls) {
            if (tc.type === 'tool_call_start') {
              showWorkIndicator(true, '⚙️ 执行 ' + tc.name + '...');

                const area = document.getElementById('chatArea');
                aiMsg = document.createElement('div');
                aiMsg.className = 'msg ai';
                aiMsg.innerHTML = '<div class="av">🤖</div><div class="bubble"><div class="reply-thinking"></div><div class="reply-tools"></div></div>';
                area.appendChild(aiMsg);
              }
              
              const toolsDiv = aiMsg.querySelector('.reply-tools');
              if (toolsDiv) {
                // 显示完整的工具调用信息
                const toolInfo = tc.input ? JSON.stringify(tc.input, null, 2) : '';
                const toolDiv = document.createElement('div');
                toolDiv.className = 'tool-call';
                toolDiv.innerHTML = '<div class="tool-header"><span class="tool-icon">🔧</span><span class="tool-name">' + escapeHtml(tc.name) + '</span><span class="tool-status running">运行中</span></div>' + 
                  (toolInfo ? '<div class="tool-content">参数: ' + escapeHtml(toolInfo.substring(0, 500)) + '</div>' : '');
                toolsDiv.appendChild(toolDiv);
              }
            }
          }
        }
        
        // 处理工具结果
        const toolResults = message?.tool_results || message?.message?.tool_results;
        if (toolResults) {
          showWorkIndicator(true, '📝 处理结果...');
          
          let aiMsg = document.querySelector('.msg.ai:last-child');
          const toolsDiv = aiMsg?.querySelector('.reply-tools');
          if (toolsDiv && Array.isArray(toolResults)) {
            for (const tr of toolResults) {
              const toolDiv = toolsDiv.querySelector('[data-tool-id="' + tr.tool_call_id + '"]');
              if (toolDiv) {
                const statusSpan = toolDiv.querySelector('.tool-status');
                if (statusSpan) {
                  statusSpan.className = 'tool-status done';
                  statusSpan.textContent = '完成';
                }
                const resultContent = tr.output ? (typeof tr.output === 'string' ? tr.output : JSON.stringify(tr.output, null, 2)) : '';
                if (resultContent) {
                  const contentDiv = toolDiv.querySelector('.tool-content');
                  if (contentDiv) {
                    contentDiv.innerHTML += '<br>结果: ' + escapeHtml(resultContent.substring(0, 1000));
                  } else {
                    toolDiv.innerHTML += '<div class="tool-content">结果: ' + escapeHtml(resultContent.substring(0, 1000)) + '</div>';
                  }
                }
              }
            }
          }
        }
      } else if (state === 'final' || state === 'aborted') {
        // 完成
        showWorkIndicator(false);
        
        const aiMsg = document.querySelector('.msg.ai:last-child .bubble');
        
        // 处理 final 状态的消息内容（可能没有 delta 状态）
        if (message && aiMsg) {
          const content = extractContent(message);
          if (content && content.trim()) {
            aiMsg.dataset.rawText = content;
            aiMsg.innerHTML = fmt(content) + '<button class="tts-btn" style="display:none;" onclick="toggleTTS(this)">🔊 朗读</button>';
            scrollToBottom();
          }
        }
        
        // 保存到历史记录（如果之前没有保存）
        if (aiMsg) {
          const content = aiMsg.innerText;
          if (content && content !== '⏳ 响应完成') {
            saveMessageToHistory({ role: 'assistant', content: content, timestamp: Date.now() });
          }
          
          // 显示朗读按钮
          const ttsBtn = aiMsg.querySelector('.tts-btn');
          if (ttsBtn) {
            ttsBtn.style.display = 'inline-flex';
          }
          
          // 保存最后一条 AI 消息
          lastAIMessage = aiMsg.dataset.rawText || content;
        }
        
        document.getElementById('sendBtn').disabled = false;
      } else if (state === 'error') {
        showWorkIndicator(false);
        const aiMsg = document.querySelector('.msg.ai:last-child .bubble');
        if (aiMsg) {
          aiMsg.innerHTML = '❌ ' + (payload.errorMessage || '错误');
        }
        document.getElementById('sendBtn').disabled = false;
      }
    }
    
    // 从消息对象提取内容
    function extractContent(message) {
      if (!message) return '';
      
      let content = '';
      
      // 调试：打印消息结构
      console.log('extractContent message:', JSON.stringify(message).substring(0, 300));
      
      // 处理数组格式的内容 [[{"type":"text","text":"..."}]]
      if (Array.isArray(message)) {
        for (const part of message) {
          if (part && typeof part === 'object') {
            if (part.type === 'text' && part.text) {
              content += part.text;
            } else if (part.content) {
              content += typeof part.content === 'string' ? part.content : (part.content.text || JSON.stringify(part.content));
            } else if (part.text) {
              content += part.text;
            }
          } else if (typeof part === 'string') {
            content += part;
          }
        }
        return content;
      }
      
      // 处理消息是对象的情况
      if (typeof message === 'object') {
        // 处理 message.content 是数组的情况
        if (Array.isArray(message.content)) {
          for (const part of message.content) {
            if (part && typeof part === 'object') {
              if (part.type === 'text' && part.text) {
                content += part.text;
              } else if (part.text) {
                content += part.text;
              }
            } else if (typeof part === 'string') {
              content += part;
            }
          }
        }
        // 尝试获取 message.content (非数组)
        else if (message.content) {
          if (typeof message.content === 'object') {
            content = message.content.text || message.content.content || JSON.stringify(message.content);
          } else {
            content = message.content;
          }
        }
        // 尝试获取 message.text (某些 API 格式)
        else if (message.text) {
          content = message.text;
        }
        // 尝试获取 message.message (嵌套结构)
        else if (message.message) {
          if (typeof message.message === 'object') {
            content = message.message.content || message.message.text || JSON.stringify(message.message);
          } else {
            content = message.message;
          }
        }
      } else if (typeof message === 'string') {
        content = message;
      }
      
      // 思考过程
      if (message.thinking) {
        content = '<span class="thinking-icon">💭</span> ' + message.thinking + (content ? '<br>' + content : '');
      }
      
      return content;
    }

    async function sendMsg() {
      const input = document.getElementById('msgInput');
      const content = input.value.trim();
      const imagesToSend = selectedImages.length > 0 ? [...selectedImages] : []; // 复制图片数组
      const filesToSend = selectedFiles.length > 0 ? [...selectedFiles] : []; // 复制文件数组
      
      // 检查是否有内容、图片或文件
      if (!content && imagesToSend.length === 0 && filesToSend.length === 0) return;
      
      // 检查 WebSocket 是否已连接
      if (!gwClient || !gwClient.authenticated) {
        alert('请等待连接建立...');
        return;
      }

      // 显示用户消息
      const area = document.getElementById('chatArea');
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      
      if (imagesToSend.length > 0 || filesToSend.length > 0) {
        const div = document.createElement('div');
        div.className = 'msg user';
        
        // 生成多张图片 HTML
        let imgHtml = '';
        for (const img of imagesToSend) {
          imgHtml += '<img src="' + img.base64 + '" style="max-width: 150px; max-height: 150px; border-radius: 12px; margin: 4px; display: inline-block;">';
        }
        
        // 生成文件列表 HTML
        let fileHtml = '';
        for (const file of filesToSend) {
          const icon = getFileIcon(file.name, file.type);
          fileHtml += `<div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:8px;margin:4px 0;">
            <span style="font-size:20px">${icon}</span>
            <div>
              <div style="font-size:13px">${escapeHtml(file.name)}</div>
              <div style="font-size:11px;color:var(--text2)">${formatFileSize(file.size)}</div>
            </div>
          </div>`;
        }
        
        let textHtml = content ? '<div>' + fmt(content) + '</div>' : '';
        div.innerHTML = '<div class="av">👤</div><div class="bubble">' + imgHtml + fileHtml + textHtml + '<div class="time">' + time + '</div></div>';
        area.appendChild(div);
        
        // 保存用户消息到历史记录
        const userMsg = {
          role: 'user',
          content: [
            ...(content ? [{ type: 'text', text: content }] : []),
            ...imagesToSend.map(img => ({ type: 'image', url: img.base64 })),
            ...filesToSend.map(file => ({ type: 'file', name: file.name, size: file.size, mimeType: file.type, path: file.serverPath }))
          ],
          timestamp: Date.now()
        };
        saveMessageToHistory(userMsg);
      } else {
        addMsg({ content, role: 'user' });
        saveMessageToHistory({ role: 'user', content: content, timestamp: Date.now() });
      }
      
      input.value = '';
      clearImages(); // 清除所有图片
      clearFiles(); // 清除所有文件
      document.getElementById('sendBtn').disabled = true;
      scrollToBottom();

      // 显示工作指示器
      showWorkIndicator(true, '🤔 发送中...');
      
      // 创建 AI 消息容器
      const aiMsg = createAIMessage();
      const bubble = aiMsg.querySelector('.bubble');
      const toolsDiv = aiMsg.querySelector('.reply-tools');
      
      bubble.innerHTML = '<span class="thinking-icon">🤔</span> 发送消息...';
      
      try {
        // 通过 WebSocket 发送消息
        let attachments = [];
        
        // 处理图片
        if (imagesToSend.length > 0) {
          for (const imgToSend of imagesToSend) {
            if (imgToSend.base64 && imgToSend.base64.startsWith('data:')) {
              const match = imgToSend.base64.match(/^data:(image\/[^;]+);base64,(.+)$/);
              if (match) {
                attachments.push({ 
                  type: 'image', 
                  mimeType: match[1], 
                  content: match[2],
                  path: imgToSend.serverPath
                });
                console.log('[DEBUG] 发送图片, 服务器路径:', imgToSend.serverPath);
              }
            }
          }
        }
        
        // 处理文件
        if (filesToSend.length > 0) {
          for (const fileToSend of filesToSend) {
            // 读取文件内容
            const fileContent = await readFileAsBase64(fileToSend.file);
            const match = fileContent.match(/^data:([^;]+);base64,(.+)$/);
            if (match) {
              attachments.push({
                type: 'file',
                mimeType: fileToSend.type || match[1],
                content: match[2],
                filename: fileToSend.name,
                path: fileToSend.serverPath
              });
              console.log('[DEBUG] 发送文件:', fileToSend.name, '服务器路径:', fileToSend.serverPath);
            }
          }
        }
        
        // 生成消息文本
        let messageText = content;
        if (imagesToSend.length > 0 && !content) {
          messageText = `请分析这${imagesToSend.length}张图片`;
        } else if (filesToSend.length > 0 && !content) {
          const fileNames = filesToSend.map(f => f.name).join(', ');
          messageText = `请分析以下文件：${fileNames}`;
        }
        
        console.log('[DEBUG] 发送图片数量:', imagesToSend.length, '文件数量:', filesToSend.length, 'attachments:', attachments.length);
        await gwClient.sendMessage(messageText, attachments);
        
        // 消息已发送，等待流式响应
        bubble.innerHTML = '<span class="thinking-icon">🤔</span> 等待响应...';
        
      } catch(e) {
        console.error('发送消息失败:', e);
        bubble.innerHTML = '❌ 发送失败: ' + e.message;
        showWorkIndicator(false);
        document.getElementById('sendBtn').disabled = false;
      }
    }

    function escapeHtml(t) {
      if (!t) return '';
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    
    function fmt(t) { 
      if (!t) return '';
      let html = escapeHtml(t).replace(/\n/g,'<br>');
      
      // 处理 MEDIA: 路径，转换为可访问的图片 URL
      // MEDIA:/root/.openclaw/media/browser/xxx.jpg -> /media/browser/xxx.jpg (通过 8080 端口服务器)
      html = html.replace(/MEDIA:([^\s<]+)/g, function(match, path) {
        // 提取相对路径部分
        // /root/.openclaw/media/browser/xxx.jpg -> browser/xxx.jpg
        const mediaMatch = path.match(/\/root\/\.openclaw\/media\/(.+)$/);
        if (mediaMatch) {
          const relativePath = mediaMatch[1];
          // 通过 8080 端口的 /media/ 路径访问
          return '<img src="/media/' + relativePath + '" style="max-width:100%;max-height:300px;border-radius:12px;margin:8px 0;cursor:pointer;" onclick="showFullImage(this.src)" alt="图片" loading="lazy">';
        }
        // 如果路径已经是相对路径
        if (!path.startsWith('/') && !path.startsWith('http')) {
          return '<img src="/media/' + path + '" style="max-width:100%;max-height:300px;border-radius:12px;margin:8px 0;cursor:pointer;" onclick="showFullImage(this.src)" alt="图片" loading="lazy">';
        }
        return match; // 保持原样
      });
      
      return html;
    }

      const img = document.createElement('img');

      img.style.cssText = 'max-width:95%;max-height:95%;border-radius:8px;object-fit:contain;';
      
      overlay.appendChild(img);
      document.body.appendChild(overlay);
    }

    // 上传图片到服务器
    async function uploadImage(imgBase64) {
      const response = await fetch(window.location.origin + '/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imgBase64 })
      });
      
      if (!response.ok) {
        throw new Error('上传失败: ' + response.status);
      }
      
      const data = await response.json();
      if (!data.success) {
        throw new Error(data.error || '上传失败');
      }
      
      return data.path;  // 返回服务器保存路径
    }

    // 压缩图片为 base64
    function compressImage(file) {

      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const maxWidth = 800;
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 加载模型列表
    async function loadModels() {

          const btnText = document.getElementById('modelBtnText');
          
          // 获取当前模型 - 只从 localStorage 读取
          let currentModel = localStorage.getItem('current_model') || '';
          
          if (!currentModel && data.current) {
            currentModel = data.current;
            console.log('使用默认模型:', currentModel);
          }
          
          console.log('当前模型:', currentModel);
          
          // 构建菜单 HTML
          let html = '';
          let currentName = '🔄 模型';
          
          data.models.forEach(model => {
            const modelId = model.id || model;
            const modelName = model.name || model;
            const isCurrent = modelId === currentModel;
            
            // 解析模型名称和提供商
            let displayName = modelName;
            let provider = '';
            const match = modelName.match(/^(.+?)\s*\(([^)]+)\)$/);
            if (match) {
              displayName = match[1].trim();
              provider = match[2];
            }
            
            if (isCurrent) {
              currentName = displayName;
            }
            
            html += `
              <div class="model-menu-item ${isCurrent ? 'selected' : ''}" onclick="selectModel('${modelId}')">
                <span class="model-name">${displayName}</span>
                ${provider ? `<span class="model-provider">(${provider})</span>` : ''}
                <span class="check">✓</span>
              </div>
            `;
          });
          
          menu.innerHTML = html;
          
          // 更新按钮文本 - 只显示模型名称，不显示提供商
          let shortName = currentName;
          const match = currentName.match(/^(.+?)\s*\(([^)]+)\)$/);
          if (match) {
            shortName = match[1].trim();
          }
          btnText.textContent = shortName || '🔄 模型';
          
          // 更新按钮标题
          if (currentModel) {
            document.getElementById('modelBtn').title = '当前模型：' + currentName;

    // 文件图标映射
    function getFileIcon(filename, mimeType) {
      const ext = filename.split('.').pop().toLowerCase();
      const icons = {
        'pdf': '📄', 'doc': '📝', 'docx': '📝', 'xls': '📊', 'xlsx': '📊',
        'ppt': '📽️', 'pptx': '📽️', 'zip': '📦', 'tar': '📦', 'gz': '📦',
        'txt': '📃', 'md': '📝', 'json': '📋', 'xml': '📋',
        'js': '💻', 'ts': '💻', 'py': '🐍', 'sh': '⚡',
        'html': '🌐', 'css': '🎨', 'csv': '📈', 'log': '📋',
        'jpg': '🖼️', 'jpeg': '🖼️', 'png': '🖼️', 'gif': '🖼️', 'webp': '🖼️',
        'mp4': '🎬', 'webm': '🎬', 'mp3': '🎵', 'wav': '🎵',
      };
      return icons[ext] || '📎';
    }
    
    // 格式化文件大小
    function formatFileSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    
    // 处理文件选择
    async function handleFileSelect() {
      const input = document.getElementById('fileInput');
      const files = Array.from(input.files);
      if (files.length === 0) return;
      
      // 检查文件数量（最多 5 个）

      for (const file of files) {

        }

      // 处理每个文件
      for (const file of files) {
        try {
          // 读取文件为 base64

    // 读取文件为 base64
    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          resolve(e.target.result);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    // 上传文件到服务器
    async function uploadFile(fileBase64, filename, mimeType) {
      const response = await fetch(window.location.origin + '/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          file: fileBase64, 
          filename: filename,
          mimeType: mimeType
        })
      });
      
      if (!response.ok) {
        throw new Error('上传失败: ' + response.status);
      }
      
      const data = await response.json();
      if (!data.success) {
        throw new Error(data.error || '上传失败');
      }
      
      return data.path;  // 返回服务器保存路径
    }

    // ========== 文字转语音 (TTS) ==========
    
    // 初始化 TTS
    function initTTS() {
      if ('speechSynthesis' in window) {
        console.log('[TTS] Web Speech API 已支持');
        return true;
      } else {
        console.log('[TTS] Web Speech API 不支持');
        return false;
      }
    }
    
    // 朗读文本
    function speakText(text, auto = false) {
      if (!('speechSynthesis' in window)) {
        alert('您的浏览器不支持语音合成');
        return false;
      }
      
      // 停止当前播放
      if (currentUtterance) {
        window.speechSynthesis.cancel();
      }
      
      // 清理文本（移除 Markdown 格式）
      const cleanText = text
        .replace(/```[\s\S]*?```/g, '')  // 移除代码块
        .replace(/`[^`]+`/g, '')  // 移除行内代码
        .replace(/\*\*([^*]+)\*\*/g, '$1')  // 移除加粗
        .replace(/\*([^*]+)\*/g, '$1')  // 移除斜体
        .replace(/#{1,6}\s+/g, '')  // 移除标题
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')  // 移除链接，保留文本
        .replace(/!\[([^\]]*)\]\([^)]+\)/g, '')  // 移除图片
        .replace(/^\s*[-*+]\s+/gm, '')  // 移除列表标记
        .replace(/^\s*\d+\.\s+/gm, '')  // 移除数字列表
        .replace(/\n+/g, '。')  // 换行替换为句号
        .replace(/\s+/g, ' ')  // 合并空格
        .trim();
      
      if (!cleanText) {
        return false;
      }
      
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'zh-CN';
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;
      
      // 获取可用语音
      const voices = window.speechSynthesis.getVoices();
      let zhVoice = voices.find(v => v.lang.includes('zh'));
      if (zhVoice) {
        utterance.voice = zhVoice;
      } else {
        utterance.lang = 'en-US';
      }
      
      utterance.onstart = () => {
        showTTSSpeaking(true);
        updateTTSButtonState(true);
      };
      
      utterance.onend = () => {
        currentUtterance = null;
        showTTSSpeaking(false);
        updateTTSButtonState(false);
      };
      
      utterance.onerror = (e) => {
        currentUtterance = null;
        showTTSSpeaking(false);
        updateTTSButtonState(false);
      };
      
      currentUtterance = utterance;
      window.speechSynthesis.speak(utterance);
      return true;
    }
    
    // 停止朗读
    function stopSpeak() {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        currentUtterance = null;
        showTTSSpeaking(false);
        updateTTSButtonState(false);
      }
    }
    
    // 更新 TTS 按钮状态
    function updateTTSButtonState(isSpeaking) {

      const ttsBtns = document.querySelectorAll('.tts-btn');

          btn.textContent = '🔊 朗读';

    function speakLastAIMessage() {

    }

    document.addEventListener('DOMContentLoaded', function() {
